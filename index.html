<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraAI.in | Digital Creator Studio</title>
    <script src="https://cdn.unityads.unity3d.com/sdk/4.0/unityads.js"></script>
    <style>
        :root { --blue: #58a6ff; --purple: #bc8cff; --bg: #0d1117; --card: #161b22; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: #c9d1d9; padding: 15px; }

        .header { text-align: center; padding: 20px 0; }
        .header h1 { font-size: 28px; background: linear-gradient(to right, var(--blue), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .section-card { background: var(--card); border: 1px solid #30363d; border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { font-size: 14px; color: var(--blue); margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }

        input, select { width: 100%; padding: 12px; background: #010409; border: 1px solid #30363d; border-radius: 12px; color: white; margin-bottom: 10px; }
        
        .btn-pro { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; background: linear-gradient(45deg, #238636, #2ea043); color: white; transition: 0.3s; }
        .btn-pro:active { transform: scale(0.95); }

        /* Bio-Preview Mockup */
        .preview-box { background: #010409; border-radius: 15px; padding: 15px; margin-top: 15px; border: 1px dashed #30363d; text-align: center; }
        .preview-name { font-weight: bold; color: var(--purple); font-size: 18px; }
    </style>
</head>
<body>

<div class="header">
    <h1>AuraAI Pro Hub</h1>
    <p style="font-size: 12px; color: #8b949e;">Advanced Tools for Professional Creators</p>
</div>

<div class="section-card">
    <h2>✨ Bio-Link Creator (Insta Style)</h2>
    <input type="text" id="userName" placeholder="Your Name/Brand">
    <input type="text" id="userTitle" placeholder="Profession (e.g. Gamer, Artist)">
    <input type="text" id="userLink" placeholder="Link (YouTube/Insta)">
    <button class="btn-pro" onclick="handleAction('bio')">GENERATE BIO-LINK</button>
    <div id="bioPreview" class="preview-box" style="display:none;">
        <div class="preview-name" id="dispName"></div>
        <div id="dispTitle" style="font-size:12px; margin-bottom:10px;"></div>
        <div style="color:var(--blue); font-size:12px;" id="dispLink"></div>
    </div>
</div>

<div class="section-card">
    <h2>💬 WhatsApp Direct Chat</h2>
    <input type="number" id="waPhone" placeholder="Enter Number with 91...">
    <button class="btn-pro" style="background: #25d366;" onclick="handleAction('wa')">OPEN CHAT</button>
</div>

<div class="section-card">
    <h2>💎 Stylish Font Generator</h2>
    <input type="text" id="textInp" placeholder="Type something cool..." oninput="styleText()">
    <div id="styleOutput" style="font-size: 14px; color: var(--purple); padding: 10px; text-align: center;"></div>
</div>

<script>
    // Unity Ads Init
    UnityAds.init('5076529', true);

    function handleAction(type) {
        // Asli Kamaai Logic: Har click pe Ad trigger
        if(typeof UnityAds !== 'undefined') {
            UnityAds.show('Interstitial_Android');
        }

        if(type === 'bio') {
            document.getElementById('bioPreview').style.display = 'block';
            document.getElementById('dispName').innerText = document.getElementById('userName').value || "Creator Name";
            document.getElementById('dispTitle').innerText = document.getElementById('userTitle').value || "Pro User";
            document.getElementById('dispLink').innerText = "🔗 " + (document.getElementById('userLink').value || "auraai.in/profile");
            alert("Bio-Link Saved Successfully! ✅");
        } 
        else if(type === 'wa') {
            let num = document.getElementById('waPhone').value;
            if(num) window.open(`https://wa.me/${num}`, '_blank');
        }
    }

    function styleText() {
        let val = document.getElementById('textInp').value;
        if(val) document.getElementById('styleOutput').innerText = "𝓐𝓾𝓻𝓪 𝓢𝓽𝔂𝓵𝓮: " + val;
    }
</script>

</body>
</html>
