<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraAI.in | AI Pro Studio</title>
    <script src="https://cdn.unityads.unity3d.com/sdk/4.0/unityads.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #020617; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        /* Modern Glass Design */
        .container { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 28px; padding: 40px; width: 90%; max-width: 450px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        
        h1 { font-size: 36px; background: linear-gradient(to right, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
        p { color: #94a3b8; font-size: 14px; margin-bottom: 30px; }

        /* Professional Buttons */
        .upload-area { border: 2px dashed #334155; border-radius: 18px; padding: 25px; cursor: pointer; transition: 0.3s; margin-bottom: 20px; }
        .upload-area:hover { border-color: #38bdf8; background: rgba(56, 189, 248, 0.05); }
        
        .action-btn { width: 100%; padding: 18px; border-radius: 15px; border: none; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.4s; margin: 10px 0; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-primary { background: linear-gradient(45deg, #2563eb, #7c3aed); color: white; box-shadow: 0 10px 20px -5px rgba(37, 99, 235, 0.4); }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 15px 25px -5px rgba(37, 99, 235, 0.5); }

        /* Loading Shimmer */
        #loader { display: none; width: 100%; height: 6px; background: #1e293b; border-radius: 10px; position: relative; overflow: hidden; margin: 20px 0; }
        #loader::after { content: ""; position: absolute; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, #38bdf8, transparent); animation: load 1.5s infinite; }
        @keyframes load { 100% { left: 100%; } }

        #result-img { width: 100%; border-radius: 15px; margin-top: 20px; border: 1px solid #334155; display: none; }
        .footer-text { font-size: 11px; color: #475569; margin-top: 25px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>AuraAI.in</h1>
        <p>Advanced Image Fresh & Background Removal</p>

        <input type="file" id="imageInput" hidden accept="image/*">
        <div class="upload-area" onclick="document.getElementById('imageInput').click()">
            <span id="file-label" style="color: #64748b;">📁 Tap to Choose Photo</span>
        </div>

        <div id="loader"></div>

        <button class="action-btn btn-primary" onclick="startProcessing()">✨ FRESH & CLEAN PHOTO</button>
        
        <div id="output-box">
            <img id="result-img" src="" alt="AuraAI Result">
            <a id="downloadBtn" style="display:none; text-decoration:none;" class="action-btn btn-primary" download="AuraAI_Fresh.png">📥 DOWNLOAD HD</a>
        </div>

        <p class="footer-text">Powered by VdoWin Ads System</p>
    </div>

    <script>
        // Sab Kuch Set Hai Bhai
        const CONFIG = {
            UNITY_GAME_ID: '5076529', 
            UNITY_PLACEMENT: 'Interstitial_Android',
            BG_API_KEY: 'mtRYRnmx3dNQ1WhvnYuRgnQz'
        };

        // Initialize Ads
        UnityAds.init(CONFIG.UNITY_GAME_ID, true);

        // UI Updates for file selection
        document.getElementById('imageInput').onchange = function() {
            document.getElementById('file-label').innerText = "✅ " + this.files[0].name;
        };

        async function startProcessing() {
            const file = document.getElementById('imageInput').files[0];
            if(!file) return alert("Pehle photo toh select karo!");

            // WhatsApp Prompt for Lead (Professional Trick)
            const wa = prompt("Verification: Enter WhatsApp Number for HD Download:");
            if(!wa || wa.length < 10) return alert("Valid number chahiye!");

            document.getElementById('loader').style.display = 'block';

            const formData = new FormData();
            formData.append('image_file', file);
            formData.append('size', 'auto');

            try {
                const res = await fetch('https://api.remove.bg/v1.0/removebg', {
                    method: 'POST',
                    headers: { 'X-Api-Key': CONFIG.BG_API_KEY },
                    body: formData
                });

                if(res.ok) {
                    const blob = await res.blob();
                    const url = URL.createObjectURL(blob);
                    
                    const img = document.getElementById('result-img');
                    img.src = url;
                    img.style.display = 'block';
                    
                    const dl = document.getElementById('downloadBtn');
                    dl.href = url;
                    dl.style.display = 'flex';

                    // Show Full Screen Ad (Kamaai)
                    UnityAds.show(CONFIG.UNITY_PLACEMENT);
                } else {
                    alert("Server Busy! Check API Key.");
                }
            } catch (e) {
                alert("Network Error!");
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        }
    </script>
</body>
</html>
