<div class="container">
    <div class="tool-card">
        <h2>🔥 Daily Status & Shayari</h2>
        <div id="statusDisplay" style="background:#0d1117; padding:15px; border-radius:10px; min-height:60px; margin-bottom:15px; border:1px solid #30363d; font-style:italic; color:#bc8cff;">
            "Click below to get trending AI Captions..."
        </div>
        <select id="moodSelect">
            <option value="attitude">Attitude Status 😎</option>
            <option value="love">Love Shayari ❤️</option>
            <option value="motivation">Success Quotes 🚀</option>
        </select>
        <button class="btn-premium" onclick="generateStatus()">GENERATE NEW STATUS</button>
        <button class="btn-premium" style="background:#30363d; margin-top:10px;" onclick="copyStatus()">COPY TO CLIPBOARD</button>
    </div>

    <div class="tool-card">
        <h2>💬 Direct WhatsApp Chat</h2>
        <input type="number" id="waNum" placeholder="Phone Number (e.g. 919876...)">
        <button class="btn-premium" style="background:#25d366;" onclick="waChat()">OPEN CHAT</button>
    </div>
</div>

<script>
    const data = {
        attitude: ["Sher apna rasta khud banate hain. 😎", "Hater mere fan ban gaye. 🔥", "Aura aisa ki duniya dekhti reh jaye."],
        love: ["Tum meri wo khushi ho jo har kisi ko nahi milti. ❤️", "Mohabbat thi isliye jaane diya.", "Ishq mein sab kuch kurbaan hai."],
        motivation: ["Rukna nahi hai, abhi toh poora aasmaan baaki hai. 🚀", "Hard work beats talent.", "Sapne bade dekho, mehnat usse bhi badi karo."]
    };

    function generateStatus() {
        const mood = document.getElementById('moodSelect').value;
        const list = data[mood];
        const random = list[Math.floor(Math.random() * list.length)];
        document.getElementById('statusDisplay').innerText = random;
        
        // Show Ad on every generate
        if(typeof UnityAds !== 'undefined') UnityAds.show('Interstitial_Android');
    }

    function copyStatus() {
        const text = document.getElementById('statusDisplay').innerText;
        navigator.clipboard.writeText(text);
        alert("Success: Caption Copied! ✅");
    }

    function waChat() {
        const num = document.getElementById('waNum').value;
        if(num) window.open(`https://wa.me/${num}`, '_blank');
    }
</script>
