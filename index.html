<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraAI.in | World's Most Advanced AI Studio</title>
    <script src="https://cdn.unityads.unity3d.com/sdk/4.0/unityads.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        /* Premium Studio Container */
        .main-card { background: linear-gradient(145deg, #0f172a, #1e293b); border: 1px solid #334155; border-radius: 45px; padding: 40px 25px; width: 92%; max-width: 420px; text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.6); }
        
        /* Professional Branding */
        h1 { font-size: 32px; background: linear-gradient(90deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        .hero-text { font-size: 14px; color: #94a3b8; line-height: 1.6; margin-bottom: 30px; }

        /* Round Upload Section */
        .round-zone { width: 160px; height: 160px; border: 2px solid #38bdf8; border-radius: 50%; margin: 0 auto 25px; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(56, 189, 248, 0.03); cursor: pointer; border-style: dashed; }
        
        .btn-aura { background: linear-gradient(to right, #2563eb, #7c3aed); color: white; border: none; padding: 18px; border-radius: 35px; width: 100%; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2); }
        .btn-aura:hover { transform: scale(1.02); }

        /* Result & Loading */
        #loading { display: none; color: #38bdf8; font-size: 13px; margin: 15px 0; font-weight: 500; }
        #output { display: none; margin-top: 25px; animation: fadeIn 0.5s; }
        #res-img { width: 100%; border-radius: 25px; border: 2px solid #334155; margin-bottom: 15px; }
        .dl-btn { background: rgba(255,255,255,0.05); color: #38bdf8; text-decoration: none; padding: 12px; border-radius: 15px; display: block; border: 1px solid #38bdf8; font-size: 14px; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="main-card">
    <h1>AuraAI.in</h1>
    <p class="hero-text">The Global Leader in High-Definition Image Processing. <br> <b>Instant Background Removal & AI Photo Cleaning.</b></p>

    <input type="file" id="photoInp" hidden accept="image/*">
    <div class="round-zone" onclick="document.getElementById('photoInp').click()">
        <span style="font-size: 35px;">💎</span>
        <span id="label" style="font-size: 11px; margin-top: 8px; color: #38bdf8;">UPLOAD IMAGE</span>
    </div>

    <div id="loading">AI is Processing your HD Result...</div>
    <button class="btn-aura" onclick="runMagic()">✨ START HD PROCESSING</button>

    <div id="output">
        <img id="res-img" src="">
        <a id="dl-link" class="dl-btn" download="AuraAI_Cleaned.png">📥 DOWNLOAD ULTRA HD</a>
    </div>
</div>

<script>
    // Unity Ads Setup
    const UNITY_ID = '5076529'; 
    const BG_API = 'mtRYRnmx3dNQ1WhvnYuRgnQz';

    UnityAds.init(UNITY_ID, true);

    document.getElementById('photoInp').onchange = function() {
        if(this.files[0]) document.getElementById('label').innerText = "PHOTO READY";
    };

    async function runMagic() {
        const file = document.getElementById('photoInp').files[0];
        if(!file) return alert("Please select a photo first.");

        document.getElementById('loading').style.display = 'block';
        document.getElementById('output').style.display = 'none';

        const fd = new FormData();
        fd.append('image_file', file);

        try {
            const response = await fetch('https://api.remove.bg/v1.0/removebg', {
                method: 'POST',
                headers: { 'X-Api-Key': BG_API },
                body: fd
            });

            if(response.ok) {
                const blob = await response.blob();
                const imgUrl = URL.createObjectURL(blob);
                
                document.getElementById('res-img').src = imgUrl;
                document.getElementById('dl-link').href = imgUrl;
                
                // Tera Add (Unity) chalega yahan
                UnityAds.show('Interstitial_Android');

                document.getElementById('output').style.display = 'block';
            } else {
                alert("API Limit Reached or Network Issue.");
            }
        } catch (e) {
            alert("Error connecting to Aura servers.");
        } finally {
            document.getElementById('loading').style.display = 'none';
        }
    }
</script>

</body>
</html>
