<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraAI.in | Pro HD Studio</title>
    <script src="https://cdn.unityads.unity3d.com/sdk/4.0/unityads.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #010409; color: #e6edf3; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow-x: hidden; }
        
        /* Full Page Premium Background */
        .studio-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 10%, #161b22 0%, #010409 100%); z-index: -1; }

        .main-card { background: rgba(22, 27, 34, 0.8); backdrop-filter: blur(20px); border: 1px solid #30363d; border-radius: 35px; width: 95%; max-width: 440px; padding: 40px 20px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }

        h1 { font-size: 32px; background: linear-gradient(90deg, #58a6ff, #bc8cff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 5px; font-weight: 800; }
        .tagline { color: #8b949e; font-size: 13px; margin-bottom: 30px; }

        /* Professional Upload & Preview Zone */
        .upload-zone { width: 180px; height: 180px; border: 2px dashed #58a6ff; border-radius: 50%; margin: 0 auto 25px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; transition: 0.3s; background: rgba(88, 166, 255, 0.03); overflow: hidden; position: relative; }
        #preview { width: 100%; height: 100%; object-fit: cover; display: none; }
        .upload-icon { font-size: 40px; color: #58a6ff; }

        /* Progress Percentage Section */
        #progress-area { display: none; margin: 20px 0; }
        .bar-container { width: 100%; height: 6px; background: #21262d; border-radius: 10px; overflow: hidden; }
        .bar-fill { width: 0%; height: 100%; background: #238636; transition: 0.4s; }
        #percent { font-size: 12px; color: #58a6ff; margin-top: 8px; font-weight: bold; }

        .btn-pro { width: 100%; padding: 16px; border-radius: 15px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; background: #238636; color: white; transition: 0.2s; box-shadow: 0 4px 12px rgba(35, 134, 54, 0.3); }
        .btn-pro:active { transform: scale(0.97); }

        footer { margin-top: 30px; font-size: 10px; color: #484f58; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="studio-bg"></div>

<div class="main-card">
    <h1>AuraAI.in</h1>
    <p class="tagline">World-Class AI Background Removal & Cleaning</p>

    <input type="file" id="fileInp" hidden accept="image/*">
    <div class="upload-zone" onclick="document.getElementById('fileInp').click()">
        <div id="placeholder">
            <span class="upload-icon">💎</span>
            <p style="font-size: 11px; color: #58a6ff; margin-top: 5px;">SELECT PHOTO</p>
        </div>
        <img id="preview" src="">
    </div>

    <div id="progress-area">
        <div class="bar-container">
            <div class="bar-fill" id="fill"></div>
        </div>
        <p id="percent">Analyzing Image: 0%</p>
    </div>

    <button class="btn-pro" onclick="startAuraProcess()">✨ REMOVE BACKGROUND</button>
    
    <footer>POWERED BY VDOWIN SYSTEM</footer>
</div>

<script>
    const APP_DATA = {
        GID: '5076529', //
        KEY: 'mtRYRnmx3dNQ1WhvnYuRgnQz' //
    };

    UnityAds.init(APP_DATA.GID, true);

    document.getElementById('fileInp').onchange = function(e) {
        const file = e.target.files[0];
        if(file) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                document.getElementById('preview').src = ev.target.result;
                document.getElementById('preview').style.display = 'block';
                document.getElementById('placeholder').style.display = 'none';
            };
            reader.readAsDataURL(file);
        }
    };

    async function startAuraProcess() {
        const file = document.getElementById('fileInp').files[0];
        if(!file) return alert("Pehle photo select karein!");

        const area = document.getElementById('progress-area');
        const fill = document.getElementById('fill');
        const txt = document.getElementById('percent');

        area.style.display = 'block';
        
        let p = 0;
        const timer = setInterval(() => {
            if(p < 85) {
                p += Math.random() * 8;
                fill.style.width = p + "%";
                txt.innerText = "AI Processing: " + Math.floor(p) + "%";
            }
        }, 500);

        const form = new FormData();
        form.append('image_file', file);

        try {
            const res = await fetch('https://api.remove.bg/v1.0/removebg', {
                method: 'POST',
                headers: { 'X-Api-Key': APP_DATA.KEY },
                body: form
            });

            if(res.ok) {
                clearInterval(timer);
                fill.style.width = "100%";
                txt.innerText = "Processing Done: 100%";
                
                const blob = await res.blob();
                const url = URL.createObjectURL(blob);
                document.getElementById('preview').src = url;

                // Unity Ads
                UnityAds.show('Interstitial_Android');

                setTimeout(() => {
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'AuraAI_Cleaned.png';
                    a.click();
                }, 1000);
            } else {
                alert("Server busy! API Key limit check karein.");
            }
        } catch (e) {
            alert("Network Error! Internet check karein ya API Key badlein.");
        } finally {
            clearInterval(timer);
        }
    }
</script>
</body>
</html>
