<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraAI.in | HD Image Processing</title>
    <script src="https://cdn.unityads.unity3d.com/sdk/4.0/unityads.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: #020617; color: #f8fafc; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        
        .studio-card { background: #0f172a; border: 1px solid #1e293b; border-radius: 40px; padding: 40px 20px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        
        h1 { font-size: 32px; background: linear-gradient(90deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
        .tagline { font-size: 13px; color: #64748b; margin-bottom: 30px; }

        /* Round Selection Circle */
        .circle-container { width: 160px; height: 160px; border: 2px dashed #38bdf8; border-radius: 50%; margin: 0 auto 30px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; background: rgba(56, 189, 248, 0.02); overflow: hidden; }
        .preview-img { width: 100%; height: 100%; object-fit: cover; display: none; }
        
        .btn-main { background: linear-gradient(to right, #2563eb, #7c3aed); color: white; border: none; padding: 18px; border-radius: 30px; width: 100%; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-main:active { transform: scale(0.98); }

        #loading { display: none; color: #38bdf8; font-size: 14px; margin: 20px 0; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        #result-box { display: none; margin-top: 30px; border-top: 1px solid #1e293b; padding-top: 25px; }
        #final-img { width: 100%; border-radius: 20px; border: 1px solid #334155; background: #000; margin-bottom: 15px; }
        .dl-btn { background: #1e293b; color: #38bdf8; text-decoration: none; padding: 12px; border-radius: 12px; display: block; border: 1px solid #38bdf8; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

<div class="studio-card">
    <h1>AuraAI.in</h1>
    <p class="tagline">The Global Leader in AI Image Processing</p>

    <input type="file" id="photoInput" hidden accept="image/*">
    <div class="circle-container" onclick="document.getElementById('photoInput').click()">
        <div id="upload-icon">
            <span style="font-size: 40px;">💎</span>
            <p style="font-size: 11px; color: #38bdf8; margin-top: 5px;">UPLOAD IMAGE</p>
        </div>
        <img id="userPreview" class="preview-img">
    </div>

    <div id="loading">✨ AI is cleaning your photo...</div>
    <button class="btn-main" onclick="processPhoto()">✨ START HD PROCESSING</button>

    <div id="result-box">
        <p style="color: #10b981; margin-bottom: 10px; font-size: 14px;">✅ Done! Ultra HD Ready</p>
        <img id="final-img" src="">
        <a id="downloadLink" class="dl-btn" download="AuraAI_Cleaned.png">📥 DOWNLOAD RESULT</a>
    </div>
</div>

<script>
    // Unity Ads
    const UNITY_ID = '5076529'; 
    const BG_API = 'mtRYRnmx3dNQ1WhvnYuRgnQz'; //

    UnityAds.init(UNITY_ID, true);

    document.getElementById('photoInput').onchange = function(e) {
        const file = e.target.files[0];
        if(file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                document.getElementById('userPreview').src = event.target.result;
                document.getElementById('userPreview').style.display = 'block';
                document.getElementById('upload-icon').style.display = 'none';
            }
            reader.readAsDataURL(file);
        }
    };

    async function processPhoto() {
        const file = document.getElementById('photoInput').files[0];
        if(!file) return alert("Bhai, pehle photo toh select karo!");

        document.getElementById('loading').style.display = 'block';
        document.getElementById('result-box').style.display = 'none';

        const fd = new FormData();
        fd.append('image_file', file);

        try {
            const res = await fetch('https://api.remove.bg/v1.0/removebg', {
                method: 'POST',
                headers: { 'X-Api-Key': BG_API },
                body: fd
            });

            if(res.ok) {
                const blob = await res.blob();
                const url = URL.createObjectURL(blob);
                
                document.getElementById('final-img').src = url;
                document.getElementById('downloadLink').href = url;
                
                // Show Tera Ad (Unity)
                UnityAds.show('Interstitial_Android');

                document.getElementById('result-box').style.display = 'block';
            } else {
                // Agar server error aaye toh alert
                alert("Server busy! API Key ki limit check karein.");
            }
        } catch (e) {
            alert("Network Error! Phir se koshish karein.");
        } finally {
            document.getElementById('loading').style.display = 'none';
        }
    }
</script>

</body>
</html>
