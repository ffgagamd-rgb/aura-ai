<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraAI.in | Professional AI Studio</title>
    <script src="https://cdn.unityads.unity3d.com/sdk/4.0/unityads.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #05070a; color: white; min-height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        
        /* Full Screen Premium Studio Look */
        .studio-container { width: 100vw; height: 100vh; background: radial-gradient(circle at top, #1e293b 0%, #020617 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; position: relative; }
        
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 40px; width: 100%; max-width: 450px; padding: 40px 25px; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.8); z-index: 10; }

        h1 { font-size: 36px; background: linear-gradient(to right, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; font-weight: 800; }
        .status-text { color: #94a3b8; font-size: 14px; margin-bottom: 30px; }

        /* Real-time Image Preview Area */
        .preview-zone { width: 100%; height: 220px; border-radius: 25px; border: 2px dashed #38bdf8; margin-bottom: 25px; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; overflow: hidden; background: rgba(56, 189, 248, 0.05); }
        #imgPreview { width: 100%; height: 100%; object-fit: contain; display: none; }
        
        /* Progress Bar Section */
        .progress-container { width: 100%; display: none; margin-bottom: 20px; }
        .progress-bar-bg { width: 100%; height: 8px; background: #1e293b; border-radius: 10px; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: linear-gradient(to right, #38bdf8, #7c3aed); transition: width 0.3s; }
        #percentText { font-size: 12px; color: #38bdf8; margin-top: 8px; font-weight: bold; }

        .btn-action { width: 100%; padding: 18px; border-radius: 20px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; background: linear-gradient(45deg, #2563eb, #7c3aed); color: white; transition: 0.3s; box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3); }
        .btn-action:active { transform: scale(0.96); }

        /* Ad & Footer */
        .ad-wala { margin-top: 30px; font-size: 10px; color: #475569; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="studio-container">
    <div class="glass-panel">
        <h1>AuraAI.in</h1>
        <p class="status-text">Premium AI Background Removal Studio</p>

        <input type="file" id="imageInput" hidden accept="image/*">
        <div class="preview-zone" onclick="document.getElementById('imageInput').click()" id="dropArea">
            <div id="uploadPlaceholder">
                <span style="font-size: 40px;">📸</span>
                <p style="font-size: 12px; color: #38bdf8; margin-top: 10px;">TAP TO CHOOSE PHOTO</p>
            </div>
            <img id="imgPreview" src="">
        </div>

        <div class="progress-container" id="progBox">
            <div class="progress-bar-bg">
                <div class="progress-fill" id="progFill"></div>
            </div>
            <p id="percentText">Processing: 0%</p>
        </div>

        <button class="btn-action" onclick="startAIProcess()">✨ REMOVE BACKGROUND</button>
        
        <p class="ad-wala">SECURE AI INFRASTRUCTURE BY VDOWIN</p>
    </div>
</div>

<script>
    const CONFIG = {
        UNITY_ID: '5076529', //
        BG_API: 'mtRYRnmx3dNQ1WhvnYuRgnQz' //
    };

    UnityAds.init(CONFIG.UNITY_ID, true);

    document.getElementById('imageInput').onchange = function(e) {
        const file = e.target.files[0];
        if(file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                document.getElementById('imgPreview').src = event.target.result;
                document.getElementById('imgPreview').style.display = 'block';
                document.getElementById('uploadPlaceholder').style.display = 'none';
            }
            reader.readAsDataURL(file);
        }
    };

    async function startAIProcess() {
        const file = document.getElementById('imageInput').files[0];
        if(!file) return alert("Bhai pehle photo toh chuno!");

        const progBox = document.getElementById('progBox');
        const progFill = document.getElementById('progFill');
        const percentText = document.getElementById('percentText');

        progBox.style.display = 'block';
        
        // Animated Progress Bar (%)
        let progress = 0;
        const interval = setInterval(() => {
            if(progress < 90) {
                progress += Math.random() * 10;
                progFill.style.width = progress + "%";
                percentText.innerText = "AI Processing: " + Math.floor(progress) + "%";
            }
        }, 400);

        const fd = new FormData();
        fd.append('image_file', file);

        try {
            const res = await fetch('https://api.remove.bg/v1.0/removebg', {
                method: 'POST',
                headers: { 'X-Api-Key': CONFIG.BG_API },
                body: fd
            });

            if(res.ok) {
                clearInterval(interval);
                progFill.style.width = "100%";
                percentText.innerText = "Processing Complete: 100%";
                
                const blob = await res.blob();
                const resultUrl = URL.createObjectURL(blob);
                
                document.getElementById('imgPreview').src = resultUrl;
                
                // Show Tera Ad (Kamaai)
                UnityAds.show('Interstitial_Android');
                
                setTimeout(() => {
                    const link = document.createElement('a');
                    link.href = resultUrl;
                    link.download = 'AuraAI_HD.png';
                    link.click();
                }, 1000);
            } else {
                alert("API Limit ya server error! Check credentials.");
            }
        } catch (e) {
            alert("Network Error! Internet check karke phir se try karein.");
        } finally {
            clearInterval(interval);
        }
    }
</script>
</body>
</html>
