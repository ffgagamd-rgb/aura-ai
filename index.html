<script>
    const UNITY_ID = '5076529';
    let isAdReady = false;

    // Fast Loading Initialization
    UnityAds.init(UNITY_ID, true, {
        onComplete: () => { isAdReady = true; console.log("Ads Ready!"); },
        onFailed: (error, message) => { isAdReady = false; console.log("Ads Failed: " + message); }
    });

    function shareCard() {
        // Agar Ad ready hai toh dikhao, nahi toh card save karne do
        if(isAdReady) {
            UnityAds.show('Interstitial_Android');
            alert("Card Saved! Link Copying...");
        } else {
            // Backup: Agar SDK loading bol raha hai toh bypass karo
            alert("Card Created Successfully! ✅ (Ad loading in background)");
            // Yahan hum Admitad ka link redirect kar sakte hain
        }
    }
</script>
