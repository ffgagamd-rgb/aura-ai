<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>AuraAI - Free Background Remover & Photo Cleaner Online</title>
    <meta name="description" content="Use AuraAI.in to remove image background and clean photos for free using AI. Professional tools for Purvanchal creators.">
    <meta name="keywords" content="AuraAI, Background Remover, Photo Cleaner, AI Tools, Free Online Tool, AuraAI.in">
    <meta name="author" content="AuraAI Admin">

    <style>
        body { background: #020617; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .container { background:#0f172a; color:#fff; padding:30px; border-radius:20px; width: 90%; max-width:450px; border:1px solid #334155; text-align:center; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        h1 { color:#38bdf8; font-size: 28px; margin-bottom: 5px; }
        p.tagline { color: #94a3b8; margin-bottom: 25px; font-size: 14px; }
        .upload-box { border:2px dashed #38bdf8; padding:40px; cursor:pointer; border-radius:15px; margin-bottom:20px; background:rgba(56,189,248,0.05); transition: 0.3s; }
        .upload-box:hover { background:rgba(56,189,248,0.1); border-color: #7dd3fc; }
        .btn-group { display:grid; grid-template-columns:1fr 1fr; gap:15px; }
        button { background:#38bdf8; border:none; padding:15px; border-radius:10px; font-weight:bold; cursor:pointer; color:#0f172a; font-size: 15px; transition: 0.2s; }
        button:hover { background: #7dd3fc; transform: translateY(-2px); }
        #loader { display:none; color:#38bdf8; font-weight:bold; margin:20px 0; letter-spacing: 1px; }
        #result-area { display:none; margin-top:25px; animation: fadeIn 0.5s; }
        img { max-width:100%; border-radius:12px; border:2px solid #38bdf8; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .download-btn { display:block; background:#22c55e; color:#fff; text-decoration:none; padding:15px; margin-top:15px; border-radius:10px; font-weight:bold; font-size: 16px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <h1>AuraAI.in</h1>
    <p class="tagline">Professional AI Magic Tools</p>
    
    <div onclick="document.getElementById('fileInput').click()" class="upload-box">
        <p id="fileName" style="font-weight: 500;">📁 Tap to Upload Photo</p>
        <input id="fileInput" onchange="document.getElementById('fileName').innerHTML='✅ '+this.files[0].name" style="display:none" type="file" accept="image/*"/>
    </div>

    <div class="btn-group">
        <button onclick="processAI('bg')">🖼️ Remove BG</button>
        <button onclick="processAI('clean')">✨ Clean Photo</button>
    </div>

    <div id="loader">WORKING MAGIC... ⏳</div>

    <div id="result-area">
        <img id="result-image" src="" alt="AuraAI Result"/>
        <a id="downloadBtn" href="#" download="AuraAI_Result.png" class="download-btn">Download Result ⬇️</a>
    </div>
</div>

<script>
const HF_TOKEN="hf_FzzWbdO0rfGcrjtHJimbVbiHHCqDuOaIjq";

async function processAI(t){
    const f=document.getElementById('fileInput'); 
    if(!f.files[0]) return alert("Bhai, photo toh upload karo!");

    document.getElementById('loader').style.display="block";
    document.getElementById('result-area').style.display="none";

    // Same logic as your original function
    let m = t === 'bg' ? "briaai/RMBG-1.4" : "microsoft/bringing-old-photos-back-to-life";

    try {
        const r = await fetch("https://api-inference.huggingface.co/models/" + m, {
            headers: { Authorization: "Bearer " + HF_TOKEN },
            method: "POST",
            body: f.files[0]
        });

        if(!r.ok) throw new Error("Server Busy");

        const b = await r.blob();
        const u = URL.createObjectURL(b);

        document.getElementById('result-image').src = u;
        document.getElementById('downloadBtn').href = u;
        document.getElementById('loader').style.display = "none";
        document.getElementById('result-area').style.display = "block";
    } catch(e) {
        alert("Server Busy! Please try again in a few seconds.");
        document.getElementById('loader').style.display = "none";
    }
}
</script>

</body>
</html>
